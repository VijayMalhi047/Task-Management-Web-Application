[build]
  # ✅ FIXED: Installs frontend dependencies, builds the UI, then installs backend dependencies
  command = "cd frontend && npm install && npm run build && cd ../backend && npm install"
  publish = "frontend/dist"

[functions]
  directory = "backend"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200
  force = true