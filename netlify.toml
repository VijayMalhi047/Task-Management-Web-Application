[build]
  command = "cd frontend && npm install && npm run build && cd ../backend && npm install"
  publish = "frontend/dist"

[functions]
  directory = "backend"
  node_bundler = "esbuild"
  # ✅ FIXED: Tells Netlify to preserve the raw binary WebAssembly files as an unbundled module
  external_node_modules = ["sql.js"]

[[redirects]]
  from = "/api/*"
  # ✅ FIXED: Passes paths through smoothly to match your routing targets
  to = "/.netlify/functions/server/:splat"
  status = 200
  force = true