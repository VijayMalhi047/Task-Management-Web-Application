[build]
  command = "cd frontend && npm install && npm run build && cd ../backend && npm install"
  publish = "frontend/dist"

[functions]
  directory = "backend"
  node_bundler = "esbuild"
  # ✅ FIXED: Forces Netlify to package the WebAssembly SQLite driver binary asset
  included_files = ["backend/node_modules/sql.js/dist/sql-wasm.wasm"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/api/:splat"
  status = 200
  force = true