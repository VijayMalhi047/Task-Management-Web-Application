[build]
  command = "cd frontend && npm install && npm run build && cd ../backend && npm install"
  publish = "frontend/dist"

[functions]
  directory = "backend"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/api/:splat" # ✅ FIXED: Keeps /api in the path for Express
  status = 200
  force = true